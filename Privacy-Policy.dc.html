<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="motion.js" defer></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Public+Sans:wght@400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#fff}
  *{box-sizing:border-box}
  @keyframes sbdFade{from{opacity:0}to{opacity:1}}
</style>
</helmet>

<div style="font-family:'Public Sans',sans-serif;color:#333;background:#fff">
  <dc-import name="SiteHeader" active="" hint-size="100%,76px"></dc-import>

  <section style="background:linear-gradient(180deg,#F8FAFB 0%,#fff 100%);border-bottom:1px solid #E4E8EC">
    <div style="max-width:820px;margin:0 auto;padding:72px 32px 48px">
      <div style="display:inline-flex;align-items:center;gap:10px;font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#1E6FBF"><span style="width:24px;height:1.5px;background:#1E6FBF"></span>Legal</div>
      <h1 style="font-family:'Libre Franklin',sans-serif;font-weight:800;font-size:clamp(32px,4.2vw,46px);line-height:1.08;letter-spacing:-0.025em;color:#1E3A5F;margin:18px 0 0">Privacy Policy</h1>
      <p style="font-size:16px;line-height:1.6;color:#7E8893;margin:14px 0 0">How Strategies By Design collects, uses, and protects your information.</p>
    </div>
  </section>

  <section style="max-width:820px;margin:0 auto;padding:56px 32px 88px">
    <sc-for list="{{ sections }}" as="s" hint-placeholder-count="9">
      <div style="margin-bottom:38px">
        <h2 style="font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:21px;letter-spacing:-0.01em;color:#1E3A5F;margin:0 0 12px;padding-left:16px;border-left:3px solid #3DAE2B">{{ s.title }}</h2>
        <p style="font-size:16.5px;line-height:1.74;color:#5A6470;margin:0">{{ s.body }}</p>
      </div>
    </sc-for>
    <div style="margin-top:44px;background:#F2F4F6;border:1px solid #E4E8EC;border-radius:14px;padding:26px 28px">
      <div style="font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:16px;color:#1E3A5F;margin-bottom:6px">Questions about your privacy?</div>
      <p style="font-size:15.5px;line-height:1.6;color:#5A6470;margin:0">Contact us at <a href="mailto:engage@strategiesbydesigngroup.com" style="color:#1E6FBF;text-decoration:none;font-weight:600">engage@strategiesbydesigngroup.com</a>.</p>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,360px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    return {
      sections: [
        { title:'Information We Collect', body:'We may collect personal and technical information including your name, organization, contact details, device information, website usage data, cookies, location information, and any other information you voluntarily provide through our website, forms, services, or email communications.' },
        { title:'How We Use Information', body:'We may use this information to communicate with you, respond to inquiries, provide requested services, improve website functionality, analyze usage, and support our business operations.' },
        { title:'Data Protection', body:'We take reasonable measures to protect the personal information you submit through our website. However, no method of internet transmission or electronic storage is completely secure, and we cannot guarantee absolute security.' },
        { title:'Information Security', body:'We maintain safeguards designed to preserve the confidentiality, integrity, and security of personal information collected through our website. These measures may include secure hosting, encryption where appropriate, access controls, and regular monitoring of our systems.' },
        { title:'User Consent', body:'By using our website or submitting information through our forms, you consent to the collection, use, and processing of your information as described in this Privacy Policy. Our website is not directed to children under the age of 13, and we do not knowingly collect personal information from children under 13 without verifiable parental consent. If we become aware that we have collected such information, we will take reasonable steps to delete it promptly.' },
        { title:'Cookie Usage', body:'We may use cookies and similar tracking technologies to improve website functionality, analyze traffic, and enhance user experience. You can adjust your browser settings to refuse cookies, though some features of the website may not function properly as a result.' },
        { title:'Third-Party Disclosure', body:'We do not sell or rent your personal information. We may share information with trusted service providers who help us operate our website or business, or when required to do so by law, regulation, legal process, or governmental request.' },
        { title:'Data Retention', body:'We retain personal information only for as long as necessary to fulfill the purposes described in this Privacy Policy, comply with legal obligations, resolve disputes, and enforce our agreements. When information is no longer needed, we take reasonable steps to securely delete or archive it.' },
        { title:'Contact Information', body:'If you have any questions or concerns about this Privacy Policy or our data practices, please contact us at engage@strategiesbydesigngroup.com.' },
      ],
    };
  }
}
</script>
</body>
</html>
